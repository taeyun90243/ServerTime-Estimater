<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>서버 시계</title>
  <link rel="stylesheet" href="/clock.css">
</head>
<body>
  <main class="clock-wrapper">
    <form class="target-form" id="target-form">
      <input id="target-url" name="url" type="text" inputmode="url"
             autocomplete="url" placeholder="예: https://www.example.com/">
      <button type="submit">측정</button>
      <button class="fast-measure-button" id="fast-measure-button" type="button">⚡ 빠른 측정</button>
    </form>
    <div class="measure-actions">
      <button class="remeasure-button" id="remeasure-button" type="button" disabled>재측정</button>
      <span class="duration-hint" id="duration-hint">측정 최대 15초 · 재측정 최대 12초 · 빠른 측정 최대 5초</span>
    </div>
    <div class="clock-face">
      <svg viewBox="0 0 200 200" width="360" height="360">
        <circle class="track" cx="100" cy="100" r="92"/>
        <circle class="progress" id="progress" cx="100" cy="100" r="92"
                transform="rotate(-90 100 100)"/>
        <g id="ticks"></g>
        <g id="hand-group">
          <line x1="100" y1="100" x2="100" y2="14" class="hand"/>
          <circle cx="100" cy="14" r="5" class="tip"/>
        </g>
      </svg>
      <div class="face-center">
        <div class="brand" id="host">서버 시계</div>
        <div class="time">
          <span id="hhmm">--:--</span><span class="sec" id="sec">:--</span>
        </div>
        <div class="date" id="date">----.--.--.</div>
      </div>
    </div>
    <div class="stats" id="stats"></div>
    <div class="ntp" id="ntp"></div>
    <div class="status" id="status"></div>
    <button class="details-toggle" id="details-toggle" type="button">측정 상세 보기</button>
    <div class="details" id="details" hidden>
      <div class="details-summary" id="details-summary"></div>
      <div class="details-note">
        점 위치는 응답 도착 시각이 아니라 서버 처리 추정 시각(t2 - RTT/2)입니다.
        빨간 edge는 Date 초가 바뀐 두 서버 처리 추정점 사이의 중간입니다.
      </div>
      <svg class="timeline" id="timeline" viewBox="0 0 720 200" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="details-legend">
        <span class="legend-item"><span class="dot dot-green"></span>샘플 (Date 짝수초)</span>
        <span class="legend-item"><span class="dot dot-blue"></span>샘플 (Date 홀수초)</span>
        <span class="legend-item"><span class="edge-mark"></span>edge (Date N→N+1)</span>
        <span class="legend-item"><span class="dot dot-gap"></span>RTT 큼 (median×2 이상)</span>
      </div>
      <div class="details-tooltip" id="details-tooltip" hidden></div>
    </div>
  </main>
  <script src="/clock.js"></script>
</body>
</html>
